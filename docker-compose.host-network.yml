# Alternative docker-compose config using host network mode
# This bypasses Docker networking entirely and uses host network
# Use this if PostgreSQL connection still fails with bridge network

services:
  # Backend Service - LangGraph Trading Analytics API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-backend
    network_mode: host # Use host network - simpler for localhost connections
    volumes:
      # CRITICAL: Mount Google Cloud credentials for BigQuery access
      - ./google_credentials.json:/app/google_credentials.json:ro
      # Optional: Mount config for easy updates without rebuild
      - ./config:/app/config:ro
    environment:
      # Google Cloud credentials path (inside container)
      - GOOGLE_APPLICATION_CREDENTIALS=/app/google_credentials.json
      # Feature flags - set to false to use real BigQuery
      - USE_MOCK_INTERNAL=${USE_MOCK_INTERNAL:-true}
      - USE_MOCK_EXTERNAL=${USE_MOCK_EXTERNAL:-true}
      # BigQuery configuration
      - BIGQUERY_PROJECT=${BIGQUERY_PROJECT:-}
      - BIGQUERY_DATASET=${BIGQUERY_DATASET:-}
      # External API keys
      - COINGECKO_API_KEY=${COINGECKO_API_KEY:-}
      - BLOOMBERG_API_KEY=${BLOOMBERG_API_KEY:-}
      # LLM configuration
      - LLM_MODEL=${LLM_MODEL:-openai/gpt-3.5-turbo}
      - LLM_PROVIDER=${LLM_PROVIDER:-openrouter}
      - LLM_API_KEY=${LLM_API_KEY:-}
      # OpenRouter configuration (for LLM classification)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      # PostgreSQL configuration - use localhost with host network
      - POSTGRES_HOST=${POSTGRES_HOST:-localhost}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE:-trading_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      # Python environment
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
  # Frontend Service - React Trading Analytics UI
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trading-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_BACKEND_URL=http://localhost:8000
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
